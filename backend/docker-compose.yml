services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: monii
      POSTGRES_PASSWORD: monii
      POSTGRES_DB: monii
    ports:
      - "5432:5432"
    volumes:
      - monii_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monii"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - monii_redis:/data

volumes:
  monii_pg:
  monii_redis:
